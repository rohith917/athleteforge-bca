# Auto-deploy to Fly.io on every push to main (optional)
# Setup: fly tokens create deploy -a athleteforge-bca
#        Add FLY_API_TOKEN to GitHub repo Secrets
name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.FLY_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a athleteforge-bca
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AthleteForge — Track. Recover. Perform.</title>
    <script>
      (function () {
        var host = window.location.hostname
        /* Old Render URL → unified app (same as localhost, one domain) */
        if (host === 'athleteforge-frontend.onrender.com') {
          window.location.replace(
            'https://athleteforge-bca.onrender.com' + window.location.pathname + window.location.search + window.location.hash
          )
          return
        }
        /* Legacy static host: path URLs → hash routes */
        if (host === 'athleteforge-frontend.onrender.com') {
          var path = window.location.pathname
          if (path && path !== '/' && path !== '/index.html') {
            window.location.replace(
              window.location.origin + '/#' + path + window.location.search + window.location.hash
            )
          }
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>

# Render Blueprint — AthleteForge (one unified web app + database)
# Dashboard: New + -> Blueprint -> connect repo athleteforge-bca
databases:
  - name: athleteforge-db
    databaseName: athleteforge
    user: athleteforge_user
    plan: free
    region: singapore

services:
  - type: web
    name: athleteforge-bca
    runtime: python
    plan: free
    region: singapore
    # Root Directory left empty — uses /build.sh and /start.sh at repo root
    buildCommand: bash build.sh
    startCommand: bash start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: athleteforge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: athleteforge-bca.onrender.com,.onrender.com
      - key: FRONTEND_URL
        value: https://athleteforge-bca.onrender.com
      - key: SAME_ORIGIN_DEPLOY
        value: "True"
      - key: CORS_ALLOWED_ORIGINS
        value: https://athleteforge-bca.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://athleteforge-bca.onrender.com
      # Optional — add in Render Dashboard for free LLM copilot (Groq preferred)
      # - key: GROQ_API_KEY
      #   sync: false
      # - key: GEMINI_API_KEY
      #   sync: false